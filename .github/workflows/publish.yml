name: Publish to npm

# Publishes via npm Trusted Publishing (OIDC) — no npm token stored anywhere.
# Fires when a version tag is pushed, or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use an npm that supports Trusted Publishing
        run: npm install -g npm@latest
      - name: Publish (OIDC, with provenance)
        run: npm publish
